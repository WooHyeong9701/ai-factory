<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="hex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <polygon
    points="32,10 50.5,20.5 50.5,41.5 32,52 13.5,41.5 13.5,20.5"
    fill="none"
    stroke="url(#hex)"
    stroke-width="3.5"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
  <circle cx="32" cy="28" r="3.5" fill="#ffffff" opacity="0.95"/>
  <circle cx="23" cy="38" r="2.8" fill="#c4b5fd" opacity="0.8"/>
  <circle cx="41" cy="38" r="2.8" fill="#c4b5fd" opacity="0.8"/>
  <line x1="32" y1="28" x2="23" y2="38" stroke="#c4b5fd" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="28" x2="41" y2="38" stroke="#c4b5fd" stroke-width="1.5" opacity="0.6"/>
</svg>
